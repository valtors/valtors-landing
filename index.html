<title>valtors</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--fg:#e0e0e0;--dim:#555;--ddim:#333;--accent:#39d353;--warn:#e0504f;--blue:#00add8;--purple:#a855f7;--yellow:#e8b500;--border:#1a1a1a;--mono:'SF Mono','Fira Code','JetBrains Mono','Cascadia Code','Courier New',monospace}
html{font-size:15px}
body{background:var(--bg);color:var(--fg);font-family:var(--mono);line-height:1.5;overflow:hidden;height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;padding:16px}
.output{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;padding-right:8px}
.output::-webkit-scrollbar{width:6px}
.output::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.input-line{display:flex;align-items:center;gap:8px;padding-top:8px;border-top:1px solid var(--border)}
.input-line.hidden{display:none}
.prompt{color:var(--accent);white-space:nowrap}
#input{background:none;border:none;color:var(--fg);font-family:var(--mono);font-size:15px;outline:none;flex:1;caret-color:var(--accent)}
#input::placeholder{color:var(--dim)}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.line{white-space:pre-wrap;word-break:break-word;min-height:1em}
.line.cmd{color:var(--fg)}
.line.cmd::before{content:'$ ';color:var(--accent)}
.line.dim{color:var(--dim)}
.line.ddim{color:var(--ddim)}
.line.accent{color:var(--accent)}
.line.warn{color:var(--warn)}
.line.blue{color:var(--blue)}
.line.purple{color:var(--purple)}
.line.yellow{color:var(--yellow)}
.line.bold{font-weight:bold}
.line.gap{margin-top:12px}
.line.small{font-size:13px}

.link-row{padding:2px 0}
.link-row a{color:var(--blue)}
.link-row a:hover{color:var(--accent)}

.press-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:var(--bg)}
.press-screen.gone{display:none}
#logoCanvas{font-family:var(--mono);font-size:12px;line-height:1;letter-spacing:0;white-space:pre;margin-bottom:24px}
.press-key{font-size:20px;color:var(--accent);animation:pulse 1.5s ease-in-out infinite;margin-bottom:8px}
.press-sub{font-size:12px;color:var(--dim);margin-top:16px}
.press-tag{font-size:14px;color:var(--fg);margin-top:8px}
.press-tag2{font-size:12px;color:var(--dim);margin-top:4px}
.gradient-rule{width:320px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:16px auto}

.hint{position:fixed;bottom:8px;right:16px;font-size:12px;color:var(--dim);pointer-events:none}
.hint kbd{background:var(--border);padding:1px 5px;border-radius:2px;font-family:var(--mono);color:var(--fg)}

@media(max-width:600px){
  html{font-size:13px}
  .hint{display:none}
  .screen{padding:12px}
  #logoCanvas{font-size:7px}
  .gradient-rule{width:200px}
}
@media(max-width:400px){
  #logoCanvas{font-size:5px}
}
</style>
</head>

function startShimmer() {
  var canvas = document.getElementById('logoCanvas');
  if (!canvas) return;

  var lines = LOGO;
  var maxLen = 0;
  lines.forEach(function(l) { if (l.length > maxLen) maxLen = l.length; });

  var t = 0;

  function lerp(a, b, f) { return a + (b - a) * f; }

  function lerpColor(c1, c2, f) {
    return [
      Math.round(lerp(c1[0], c2[0], f)),
      Math.round(lerp(c1[1], c2[1], f)),
      Math.round(lerp(c1[2], c2[2], f))
    ];
  }

  var base = [57, 211, 83];
  var highlight = [200, 255, 220];

  function frame() {
    t += 0.015;
    var html = '';
    for (var row = 0; row < lines.length; row++) {
      var line = lines[row];
      for (var col = 0; col < line.length; col++) {
        var ch = line[col];
        if (ch === ' ') { html += ' '; continue; }

        var stripePos = (col / maxLen + row / lines.length) * 2;
        var wave = Math.sin(t * 2 - stripePos * 3);
        var f = (wave + 1) / 2;
        f = Math.pow(f, 2);

        var color = lerpColor(base, highlight, f);
        html += '<span style="color:rgb(' + color[0] + ',' + color[1] + ',' + color[2] + ')">' + ch + '</span>';
      }
      html += '\n';
    }
    canvas.innerHTML = html;
    shimmerRAF = requestAnimationFrame(frame);
  }
  frame();
}

function stopShimmer() {
  if (shimmerRAF) {
    cancelAnimationFrame(shimmerRAF);
    shimmerRAF = null;
  }
}

function print(text, cls) {
  var div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
  return div;
}

function printHTML(html, cls) {
  var div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.innerHTML = html;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
  return div;
}

function printGap() { print('', 'gap'); }

function typeLine(text, cls, speed, cb) {
  typeQueue.push({text:text, cls:cls, speed:speed||12, cb:cb});
  processQueue();
}

function processQueue() {
  if (typing || typeQueue.length === 0) return;
  typing = true;
  var item = typeQueue.shift();
  var div = document.createElement('div');
  div.className = 'line' + (item.cls ? ' ' + item.cls : '');
  output.appendChild(div);
  var i = 0;
  function type() {
    if (i < item.text.length) {
      div.textContent = item.text.substring(0, i+1);
      output.scrollTop = output.scrollHeight;
      i++;
      setTimeout(type, item.speed + (Math.random() * 6 - 3));
    } else {
      typing = false;
      if (item.cb) setTimeout(item.cb, 60);
      processQueue();
    }
  }
  type();
}

function pad(str, width, ch) {
  ch = ch || ' ';
  if (str.length >= width) return str;
  return str + ch.repeat(width - str.length);
}

function padCenter(str, width) {
  var total = width - str.length;
  if (total < 0) return str;
  var left = Math.floor(total / 2);
  var right = total - left;
  return ' '.repeat(left) + str + ' '.repeat(right);
}

      printGap();
      print('30 tool calls. 4 tokens of output. you saw 4. observer saw 30.', 'accent');
      printGap();
      print('12 of those calls were the agent reading its own output. observer logs everything.', 'dim');
      printHTML('<a href="https://github.com/valtors/observer">github.com/valtors/observer</a>', 'blue');
      break;

    case 'remember':
      if (!arg) {
        print('usage: remember <fact>', 'dim');
        print('example: remember the sky is blue', 'dim');
        return;
      }
      print('cairn v0.1.0 -- storing fact...', 'purple');
      printGap();
      var factText = raw.trim().substring(9).trim();
      userFacts.push(factText);
      print('  subject:    user', 'dim');
      print('  predicate:   states', 'dim');
      print('  object:      ' + factText, 'dim');
      print('  confidence: 1.0', 'dim');
      print('  recorded:   ' + new Date().toISOString(), 'dim');
      print('  valid_from:  now', 'dim');
      print('  valid_to:    open', 'dim');
      printGap();
      print('stored. cairn doesn\'t forget. it closes facts when they contradict.', 'accent');
      printGap();
      print('type "recall" to query.', 'dim');
      break;

    case 'recall':
      print('cairn v0.1.0 -- querying...', 'purple');
      printGap();
      print('  SELECT * FROM facts WHERE valid_to IS NULL', 'dim');
      printGap();
      print('  result set:', 'accent');
      printGap();
      var idx = 1;
      print('  [' + idx + '] valtors builds "tools that don\'t lie to you" (conf: 1.0, at boot)', 'dim');
      idx++;
      userFacts.forEach(function(f) {
        print('  [' + idx + '] user states "' + f + '" (conf: 1.0, just now)', 'dim');
        idx++;
      });
      print('  [' + idx + '] user states "tamish is 21" (conf: 0.95, 2026-07-15)', 'dim'); idx++;
      print('  [' + idx + '] user states "prefers go over rust" (conf: 0.8, 2026-06-01)', 'dim'); idx++;
      print('  [' + idx + '] user states "likes oil paintings" (conf: 0.7, 2026-05-20)', 'dim');
      printGap();
      var total = 4 + userFacts.length;
      print('  ' + total + ' active facts. 2 closed (contradicted). 0 forgotten.', 'dim');
      printGap();
      print('cairn doesn\'t delete. it closes. you can ask what was true on any date.', 'accent');
      printHTML('<a href="https://github.com/valtors/cairn">github.com/valtors/cairn</a>', 'purple');
      break;

    case 'install':
      if (!arg) {
        print('usage: install <tool>', 'dim');
        print('tools: relay reflow observer mcprobe vault pulse cairn smith', 'dim');
        return;
      }
      var t = TOOLS.find(function(x){ return x.name === arg; });
      if (!t) { print('unknown tool: ' + arg, 'warn'); return; }
      print('installing ' + t.name + '...', 'accent');
      printGap();
      if (t.lang === 'go') {
        print('$ go install ' + t.url.replace('https://github.com/', '') + '@latest');
      } else if (t.lang === 'rust') {
        print('$ git clone ' + t.url + '.git');
        print('$ cd ' + t.name);
        print('$ cargo install --path .');
      } else if (t.lang === 'ts') {
        print('$ npm i ' + t.npm);
      }
      printGap();
      print('done. no account needed. no email. no signup. just a binary.', 'dim');
      break;

    case 'whoami':
      print('valtors.', 'accent');
      printGap();
      print('not a company. not a startup. not a "brand".');
      printGap();
      print('a kid with an art background who learned to code because');
      print('the tools he needed didn\'t exist. so he built them.');
      printGap();
      print('eight open source tools. MIT licensed. no telemetry.');
      print('no VC. no roadmap meetings. no "we\'re excited to announce".');
      printGap();
      print('built because someone had to.', 'accent');
      break;

    case 'philosophy':
      printGap();
      typeLine('you don\'t need permission to build tools that work.', '', 30, function() {
        typeLine('you don\'t need a framework to justify a decision.', '', 30, function() {
          typeLine('you don\'t need a server in someone else\'s cloud', '', 30, function() {
            typeLine('to store your own data.', '', 30, function() {
              printGap();
              typeLine('own your tools.', 'accent', 40, function() {
                typeLine('own your data.', 'accent', 40, function() {
                  typeLine('own your infrastructure.', 'accent', 40, function() {
                    printGap();
                    print('that\'s it. that\'s the whole thing.', 'dim');
                  });
                });
              });
            });
          });
        });
      });
      break;

    case 'github':
      print('valtors on github:', 'accent');
      printGap();
      TOOLS.forEach(function(t) {
        var bar = '';
        var s = t.stars;
        for (var i = 0; i < 12; i++) { bar += i < s ? '#' : '.'; }
        printHTML('  <a href="'+t.url+'">'+t.url+'</a>  [' + bar + '] ' + t.stars + ' stars', 'link-row');
      });
      printGap();
      print('star if you want. or don\'t. the code works either way.', 'dim');
      break;

    case 'clear':
      output.innerHTML = '';
      break;

    case 'exit':
      print('exit? there is no exit. there is only the work.', 'accent');
      printGap();
      print('(but seriously, type "clear" to reset)', 'dim');
      break;

    default:
      print('command not found: ' + main, 'warn');
      print('type "help" for available commands.', 'dim');
  }
  printGap();
}

document.addEventListener('keydown', function(e) {
  if (!booted) {
    if (e.key === 'Enter') { runSetup(); }
    return;
  }
  if (e.key === 'Enter' && document.activeElement === input) {
    var val = input.value;
    if (val.trim()) { cmdHistory.unshift(val); histIdx = -1; }
    input.value = '';
    runCommand(val);
  } else if (e.key === 'ArrowUp' && document.activeElement === input) {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) { histIdx++; input.value = cmdHistory[histIdx]; }
  } else if (e.key === 'ArrowDown' && document.activeElement === input) {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; input.value = cmdHistory[histIdx]; }
    else { histIdx = -1; input.value = ''; }
  } else if (e.key === 'Tab' && document.activeElement === input) {
    e.preventDefault();
    var current = input.value.trim().toLowerCase();
    var matches = allCmds.filter(function(c){ return c.startsWith(current); });
    if (matches.length > 0) { tabIdx = (tabIdx + 1) % matches.length; input.value = matches[tabIdx]; }
  }
});

document.addEventListener('click', function() { if (booted) input.focus(); });

startShimmer();
</script>
